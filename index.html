<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Vault Antiques & Decor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>The Vault Antiques & Decor</h1>
</header>

<section class="hero">
  <h2>Discover Unique Finds</h2>
  <p>Antiques • Vintage • One-of-a-kind pieces</p>
  <button>Shop Latest Finds</button>
</section>

<section class="weekly">
  <h2>New This Week</h2>
  <div id="items-container"></div>
</section>

<section class="events">
  <h2>Upcoming Events</h2>
  <div class="event-card">
    <h3>Grand Opening</h3>
    <p>Join us for our grand opening event!</p>
    <p><strong>Date:</strong> Coming Soon</p>
  </div>
</section>

<section class="email">
  <h2>Stay Connected</h2>
  <p>Be the first to see new inventory and events</p>
  <input type="email" placeholder="Enter your email">
  <button>Subscribe</button>
</section>

<footer>
  <p>© 2026 The Vault Antiques & Decor</p>
</footer>

<script src="script.js"></script>
</body>
</html>
